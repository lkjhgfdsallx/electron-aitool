appId: com.electron-aitool.app
productName: AI Chat Tool
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Chat Tool
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
